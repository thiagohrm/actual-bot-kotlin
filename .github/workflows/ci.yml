name: CI - Build and Test

on:
  pull_request:
    types: [opened, synchronize]
    # Aqui deixamos aberto para qualquer PR que vá para a main
    branches:
      - main

jobs:
  build-and-test:
    # O "if" garante que este job só rode se a branch de origem NÃO começar com docs/
    if: "!startsWith(github.head_ref, 'docs/')"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and Test with Gradle
        run: ./gradlew build test --info --stacktrace
